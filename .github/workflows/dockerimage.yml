name: 自动发布 Docker 镜像

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# ref https://docs.github.com/zh/actions/learn-github-actions/variables
env:
  package_json: "app/package.json"
  docker_hub_owner: "b3log"
  docker_hub_repo: "siyuan"

jobs:
  build:
    # 仅 stable 版本（tag 不含 alpha/beta/rc）才构建 Docker 镜像，
    # alpha/beta/rc 预发布版本跳过整个构建流程
    if: ${{ github.repository_owner == 'siyuan-note' && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-rc') }}
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: 检查代码和子模块
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.ref }}
          submodules: recursive

      - name: 读取版本号
        id: version
        run: |
          echo "value=$(jq .version ${{ env.package_json }} -r)" >> $GITHUB_OUTPUT

      - name: 校验 Tag 版本
        # 去掉 tag 前导 v 后与 package.json 中的版本号比对，
        # 不一致说明开发者推 tag 前忘记同步版本号，直接终止整个流程。
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="${{ steps.version.outputs.value }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag (v$TAG) does not match version in package.json ($VERSION), stopping"
            exit 1
          fi
          echo "Tag matches version: $TAG"

      - name: 释放 Ubuntu 磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          # 保留工具缓存，避免误删后续可能需要的工具。
          tool-cache: false

          # 删除大型预装组件，给多架构 Docker 构建释放空间。
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 安装 QEMU
        uses: docker/setup-qemu-action@v4

      - name: 安装 Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: 登录 Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PWD }}

      - name: 构建并推送 Docker 镜像
        # 走到这里的一定是 stable 版本，直接同时打 :latest 和具体版本号标签
        run: |
          docker buildx build --push --platform linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v8 -t ${{ env.docker_hub_owner }}/${{ env.docker_hub_repo }}:latest -t ${{ env.docker_hub_owner }}/${{ env.docker_hub_repo }}:v${{ steps.version.outputs.value }} .
