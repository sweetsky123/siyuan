name: 自动构建发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

# ref https://docs.github.com/zh/actions/learn-github-actions/variables
env:
  package_json: "app/package.json"

jobs:
  prepare:
    name: 准备发布信息
    runs-on: ubuntu-latest
    outputs:
      release_title: ${{ steps.release_info.outputs.release_title }}
      version: ${{ steps.version.outputs.value }}
      packageManager: ${{ steps.packageManager.outputs.value }}
      release_body: ${{ steps.release_info.outputs.release_body }}
      prerelease: ${{ steps.release_flags.outputs.prerelease }}
      make_latest: ${{ steps.release_flags.outputs.make_latest }}
    steps:
      - name: 检查代码
        uses: actions/checkout@v6

      - name: 读取版本号
        id: version
        run: |
          echo "value=$(jq .version ${{ env.package_json }} -r)" >> $GITHUB_OUTPUT

      - name: 校验 Tag 版本
        # 仅 tag 推送触发时校验：去掉 tag 前导 v 后与 package.json 中的版本号比对，
        # 不一致说明开发者推 tag 前忘记同步版本号，直接终止整个流程。
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="${{ steps.version.outputs.value }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag (v$TAG) does not match version in package.json ($VERSION), stopping"
            exit 1
          fi
          echo "Tag matches version: $TAG"

      - name: 读取包管理器版本
        id: packageManager
        run: |
          echo "value=$(jq .packageManager ${{ env.package_json }} -r)" >> $GITHUB_OUTPUT

      - name: 生成 Release 信息
        id: release_info
        run: |
          echo "release_title=SiYuan v${{ steps.version.outputs.value }}" >> $GITHUB_OUTPUT
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "release_body<<$EOF" >> $GITHUB_OUTPUT
          echo "SiYuan v${{ steps.version.outputs.value }}" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: 判断 Release 类型
        id: release_flags
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-alpha* || "${GITHUB_REF_NAME}" == *-beta* || "${GITHUB_REF_NAME}" == *-rc* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "make_latest=false" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "make_latest=true" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.name }}
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: ubuntu-24.04
            name: ubuntu build linux
            kernel_path: "../app/kernel-linux/SiYuan-Kernel"
            build_args_suffix: "Mode=prod"
            electron_args: "dist-linux"
            goos: "linux"
            goarch: "amd64"
            suffix: "linux"
          - os: ubuntu-24.04
            name: ubuntu build linux-arm64
            kernel_path: "../app/kernel-linux-arm64/SiYuan-Kernel"
            build_args_suffix: "Mode=prod"
            electron_args: "dist-linux-arm64"
            goos: "linux"
            cc: "aarch64-linux-gnu-gcc"
            goarch: "arm64"
            suffix: "linux-arm64"
          - os: macos-latest
            name: macos build mac.dmg
            kernel_path: "../app/kernel-darwin/SiYuan-Kernel"
            build_args_suffix: "Mode=prod"
            electron_args: "dist-darwin"
            goos: "darwin"
            goarch: "amd64"
            suffix: "mac.dmg"
          - os: macos-latest
            name: macos build mac-arm64.dmg
            kernel_path: "../app/kernel-darwin-arm64/SiYuan-Kernel"
            build_args_suffix: "Mode=prod"
            electron_args: "dist-darwin-arm64"
            goos: "darwin"
            goarch: "arm64"
            suffix: "mac-arm64.dmg"
          - os: windows-latest
            name: windows build win.exe
            kernel_path: "../app/kernel/SiYuan-Kernel.exe"
            build_args_suffix: "Mode=prod"
            electron_args: "dist"
            goos: "windows"
            gobin: "bin"
            mingwsys: "MINGW64"
            goarch: "amd64"
            suffix: "win.exe"
          - os: windows-11-arm
            name: windows build win-arm64.exe
            kernel_path: "../app/kernel-arm64/SiYuan-Kernel.exe"
            build_args_suffix: "Mode=prod"
            electron_args: "dist-arm64"
            goos: "windows"
            gobin: "bin"
            mingwsys: "CLANGARM64"
            cc: "clang"
            goarch: "arm64"
            suffix: "win-arm64.exe"

    steps:
      - name: 检查代码
        uses: actions/checkout@v6
        with:
          path: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}

      - name: 安装 MingGW
        uses: msys2/setup-msys2@v2
        if: "contains( matrix.config.goos, 'windows')"
        with:
          msystem: ${{ matrix.config.mingwsys }}
          path-type: inherit
          install: ${{ matrix.config.goarch == 'arm64' && 'p7zip mingw-w64-clang-aarch64-toolchain mingw-w64-clang-aarch64-lua' || 'p7zip mingw-w64-x86_64-toolchain mingw-w64-x86_64-lua' }}

      - name: 安装 Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/kernel/go.mod
          cache-dependency-path: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/kernel/go.sum
          cache: true
      - run: go version

      - name: 安装 goversioninfo
        run: go get github.com/josephspurrier/goversioninfo/cmd/goversioninfo && go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo
        if: "contains( matrix.config.goos, 'windows')"
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/kernel
        env:
          GO111MODULE: on
          GOPATH: ${{ github.workspace }}/go

      - name: 安装 Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: 安装 pnpm
        run: npm install -g ${{ needs.prepare.outputs.packageManager }}
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app

      - name: 缓存 pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('app/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: 安装前端依赖
        run: pnpm install --no-frozen-lockfile
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app

      - name: 安装 Electron
        run: pnpm run install:electron
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app

      - name: 编译前端
        run: pnpm run build
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app

      - name: 安装前端压缩工具
        run: npm install --no-save --package-lock=false terser html-minifier-terser postcss cssnano sharp svgo glob fast-glob
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}

      - name: 压缩前端静态文件
        run: node min.js app/stage
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}

      - name: 清理构建目录
        run: |
          rm -rf "${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app/build"
          rm -rf "${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app/kernel"*
        shell: bash

      - name: 生成 Windows 版本信息
        run: ${{ github.workspace }}\go\${{ matrix.config.gobin }}\goversioninfo -platform-specific=true -icon="resource\icon.ico" -manifest="resource\goversioninfo.exe.manifest"
        if: "contains( matrix.config.goos, 'windows')"
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/kernel

      - name: 安装 Linux ARM64 工具链
        if: matrix.config.goos == 'linux' && matrix.config.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: 准备 Kernel 输出目录
        shell: bash
        run: mkdir -p "$(dirname '${{ matrix.config.kernel_path }}')"
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/kernel

      - name: 编译 Kernel
        if: matrix.config.goos != 'windows'
        shell: bash
        run: go build -gcflags="-l=4" -pgo=auto -trimpath -buildvcs=false -tags "fts5 sqlcipher" -o "${{ matrix.config.kernel_path }}" -ldflags "-s -w -X github.com/${{ github.repository }}/kernel/util.${{ matrix.config.build_args_suffix }}"
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/kernel
        env:
          GO111MODULE: on
          CGO_ENABLED: 1
          GOOS: ${{ matrix.config.goos }}
          GOPATH: ${{ github.workspace }}/go
          GOARCH: ${{ matrix.config.goarch }}
          CC: ${{ matrix.config.cc }}

      - name: 编译 Windows Kernel
        if: matrix.config.goos == 'windows'
        shell: msys2 {0}
        run: go build -gcflags="-l=4" -pgo=auto -trimpath -buildvcs=false -tags "fts5 sqlcipher" -o "${{ matrix.config.kernel_path }}" -ldflags "-s -w -X github.com/${{ github.repository }}/kernel/util.${{ matrix.config.build_args_suffix }}"
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/kernel
        env:
          GO111MODULE: on
          CGO_ENABLED: 1
          GOOS: ${{ matrix.config.goos }}
          GOPATH: ${{ github.workspace }}/go
          GOARCH: ${{ matrix.config.goarch }}
          CC: ${{ matrix.config.cc }}

      - name: 准备 Windows 提权程序
        if: "contains( matrix.config.goos, 'windows')"
        shell: bash
        run: |
          if [ "${{ matrix.config.goarch }}" = "arm64" ]; then
            cp elevator/elevator-arm64.exe kernel-arm64/elevator.exe
          else
            cp elevator/elevator-amd64.exe kernel/elevator.exe
          fi
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app

      - name: 安装 RPM 打包工具
        if: matrix.config.goos == 'linux'
        run: sudo apt-get install -y rpm

      - name: 打包桌面应用
        run: pnpm run ${{ matrix.config.electron_args }}
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app

      - name: 上传 macOS 构建产物
        if: matrix.config.goos == 'darwin'
        uses: actions/upload-artifact@v7
        with:
          name: siyuan-${{ matrix.config.suffix }}
          path: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app/build/siyuan-*-${{ matrix.config.suffix }}
          if-no-files-found: error

      - name: 上传 Windows 构建产物
        if: matrix.config.goos == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: siyuan-${{ matrix.config.suffix }}
          path: |
            ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app/build/siyuan-*-${{ matrix.config.suffix }}
            ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app/build/siyuan-*-${{ matrix.config.goarch == 'arm64' && 'win-arm64-portable.exe' || 'win-portable.exe' }}
          if-no-files-found: error

      - name: 上传 Linux AppImage
        if: matrix.config.goos == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: siyuan-${{ matrix.config.suffix }}.AppImage
          path: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app/build/siyuan-*-${{ matrix.config.suffix }}.AppImage
          if-no-files-found: error

      - name: 上传 Linux tar.gz
        if: matrix.config.goos == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: siyuan-${{ matrix.config.suffix }}.tar.gz
          path: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app/build/siyuan-*-${{ matrix.config.suffix }}.tar.gz
          if-no-files-found: error

      - name: 上传 Linux deb
        if: matrix.config.goos == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: siyuan-${{ matrix.config.suffix }}.deb
          path: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app/build/siyuan-*-${{ matrix.config.suffix }}.deb
          if-no-files-found: error

      - name: 上传 Linux rpm
        if: matrix.config.goos == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: siyuan-${{ matrix.config.suffix }}.rpm
          path: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app/build/siyuan-*-${{ matrix.config.suffix }}.rpm
          if-no-files-found: error

  build_android:
    runs-on: ubuntu-latest
    name: ubuntu 编译 android.apk
    # Android and desktop builds run in parallel, both depend on prepare.
    # create_release aggregates all artifacts once both jobs succeed.
    needs: prepare
    steps:
      - name: 检查代码
        uses: actions/checkout@v6
        with:
          path: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}

      - name: 安装 Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/kernel/go.mod
          cache-dependency-path: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/kernel/go.sum
          cache: true
      - run: go version

      - name: 安装 Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: 安装 pnpm
        run: npm install -g ${{ needs.prepare.outputs.packageManager }}
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app

      - name: 缓存 pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('app/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: 安装前端依赖
        run: pnpm install --no-frozen-lockfile
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app

      - name: 编译前端
        run: pnpm run build
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app

      - name: 安装前端压缩工具
        run: npm install --no-save --package-lock=false terser html-minifier-terser postcss cssnano sharp svgo glob fast-glob
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}

      - name: 压缩前端静态文件
        run: node min.js app/stage
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}

      - name: 安装 JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: 安装 Android NDK
        # 锁定 NDK r28b(与本地开发环境同版本)。sdkmanager 不在 PATH 上
        # (actions/runner-images#13674),用全路径调用;同时预接受 SDK 许可,
        # 避免 NDK 安装卡在交互式许可确认。
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER=$(ls "$ANDROID_HOME"/cmdline-tools/*/bin/sdkmanager 2>/dev/null | head -1)
          fi
          if [ -z "$SDKMANAGER" ]; then
            echo "ERROR: sdkmanager not found under $ANDROID_HOME/cmdline-tools/"
            exit 1
          fi
          echo "Using sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "ndk;28.2.13676358" > /dev/null
          NDK_DIR="$ANDROID_HOME/ndk/28.2.13676358"
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$NDK_DIR" >> $GITHUB_ENV
          echo "Installed NDK r28b at $NDK_DIR"

      - name: 安装 gomobile
        # 锁定到 kernel/go.mod 中 x/mobile 模块的同一版本,避免工具与库版本漂移。
        # GOPATH 被显式指向 workspace 下,go install 的产物在 $GOPATH/bin,
        # 该目录不在默认 PATH 上,需用全路径调用并写入 $GITHUB_PATH 供后续步骤使用。
        run: |
          go install golang.org/x/mobile/cmd/gomobile@2553ed8ce294
          echo "$GOPATH/bin" >> $GITHUB_PATH
          "$GOPATH/bin/gomobile" init
        env:
          GOPATH: ${{ github.workspace }}/go

      - name: 编译 Android Kernel
        run: gomobile bind -tags "fts5 sqlcipher" -ldflags "-s -w" -v -o kernel.aar -target android/arm,android/arm64,android/386,android/amd64 -androidapi 26 ./mobile/
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/kernel
        env:
          GOPATH: ${{ github.workspace }}/go
          CGO_ENABLED: 1
          JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8

      - name: 检查 siyuan-android
        uses: actions/checkout@v6
        with:
          repository: siyuan-note/siyuan-android
          ref: main
          path: ${{ github.workspace }}/siyuan-android

      - name: 修正 Android 仓库源
        # siyuan-android 默认把阿里云镜像排在最前,某些依赖(如 org.apache:apache:31)
        # 在阿里云镜像缺失会导致解析失败。CI 在海外,直接走 google()/mavenCentral()
        # 更稳;sed 删除所有 maven.aliyun.com 行,保留官方仓库。
        run: |
          sed -i '/maven.aliyun.com/d' build.gradle
          echo "=== Patched build.gradle repositories ==="
          grep -A 6 "repositories" build.gradle | head -20
        working-directory: ${{ github.workspace }}/siyuan-android

      - name: 准备 Android 构建输入
        run: |
          mkdir -p ${{ github.workspace }}/siyuan-android/app/libs
          cp ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/kernel/kernel.aar \
             ${{ github.workspace }}/siyuan-android/app/libs/kernel.aar
          cd ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app
          node scripts/trimChangelogs.js
          zip -r app.zip appearance guide stage $([ -d changelogs ] && echo changelogs)
          mkdir -p ${{ github.workspace }}/siyuan-android/app/src/main/assets
          cp app.zip ${{ github.workspace }}/siyuan-android/app/src/main/assets/app.zip

      - name: 定制 Android 应用信息和 ABI 拆包
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path(".")
          for strings in root.glob("app/src/**/res/values*/strings.xml"):
              text = strings.read_text(encoding="utf-8")
              if 'name="app_name"' in text:
                  text = re.sub(r'(<string\s+name="app_name"[^>]*>).*?(</string>)', r'\1思源笔记\2', text)
                  strings.write_text(text, encoding="utf-8")

            for manifest in root.glob("app/src/**/AndroidManifest.xml"):
              text = manifest.read_text(encoding="utf-8")
              if "android:label" in text:
                text = re.sub(r'android:label="[^"]+"', 'android:label="思源笔记"', text)
              else:
                text = re.sub(r'(<application\b)', r'\1 android:label="思源笔记"', text, count=1)
              manifest.write_text(text, encoding="utf-8")

          build_file = root / "app" / "build.gradle"
          text = build_file.read_text(encoding="utf-8")
          if "universalApk true" not in text:
              text = re.sub(
                  r'(android\s*\{)',
                  r'''\1
              splits {
                  abi {
                      enable true
                      reset()
                      include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
                      universalApk true
                  }
              }''',
                  text,
                  count=1,
              )
              build_file.write_text(text, encoding="utf-8")
          PY
        working-directory: ${{ github.workspace }}/siyuan-android

      - name: 注入 Android 签名配置
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/siyuan-android/app/siyuan-android.jks
            keytool -list \
              -keystore ${{ github.workspace }}/siyuan-android/app/siyuan-android.jks \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              -alias "$ANDROID_KEY_ALIAS" \
              -v > /dev/null
          else
            echo "Android signing secrets are incomplete; generating a temporary CI release keystore."
            ANDROID_KEYSTORE_PASSWORD=android
            ANDROID_KEY_ALIAS=androiddebugkey
            ANDROID_KEY_PASSWORD=android
            keytool -genkeypair -v \
              -keystore ${{ github.workspace }}/siyuan-android/app/siyuan-android.jks \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              -alias "$ANDROID_KEY_ALIAS" \
              -keypass "$ANDROID_KEY_PASSWORD" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=SiYuan CI,O=SiYuan,C=CN"
          fi
          cat > ${{ github.workspace }}/siyuan-android/signings.gradle <<EOF
          android {
            signingConfigs {
              siyuanConfig {
                storeFile file("siyuan-android.jks")
                storePassword "$ANDROID_KEYSTORE_PASSWORD"
                keyAlias "$ANDROID_KEY_ALIAS"
                keyPassword "$ANDROID_KEY_PASSWORD"
              }
            }
          }
          EOF
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 打包 Android 应用
        # local.properties 被 siyuan-android 的 .gitignore 忽略,CI 里需现场生成,
        # 否则 Gradle 报 "SDK location not found";gradlew 也需显式加可执行权限。
        # 产物重命名为带版本号的固定名,确保下载文件名正确(GitHub Release 的下载名
        # 取决于上传时的本地文件名,# 语法只改显示标签)。
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          chmod +x ./gradlew
          ./gradlew assembleOfficialRelease
          cd app/build/outputs/apk/official/release
          for apk in *.apk; do
            case "$apk" in
              *armeabi-v7a*) target="armeabi-v7a" ;;
              *arm64-v8a*) target="arm64-v8a" ;;
              *x86_64*) target="x86_64" ;;
              *x86*) target="x86" ;;
              *universal*) target="universal" ;;
              *) target="universal" ;;
            esac
            mv "$apk" "siyuan-${{ needs.prepare.outputs.version }}-android-${target}.apk"
          done
        working-directory: ${{ github.workspace }}/siyuan-android

      - name: 上传 Android 构建产物
        uses: actions/upload-artifact@v7
        with:
          name: siyuan-android
          path: ${{ github.workspace }}/siyuan-android/app/build/outputs/apk/official/release/siyuan-${{ needs.prepare.outputs.version }}-android-*.apk
          if-no-files-found: error

  create_release:
    name: 发布 Release
    runs-on: ubuntu-latest
    needs: [prepare, build, build_android]
    steps:
      - name: 下载全部构建产物
        uses: actions/download-artifact@v8

      - name: 解压下载的构建产物
        shell: bash
        run: |
          find . -type f -name "*.zip" -print0 | while IFS= read -r -d '' file; do
            dir=$(dirname "$file")
            unzip -q -o "$file" -d "$dir"
            rm -f "$file"
          done

      # - name: 安装 UPX 5.2.0
      #   shell: bash
      #   run: |
      #     mkdir -p "$RUNNER_TEMP/upx"
      #     cd "$RUNNER_TEMP/upx"
      #     curl -fsSL -o upx.tar.xz https://github.com/upx/upx/releases/download/v5.2.0/upx-5.2.0-amd64_linux.tar.xz
      #     tar -xf upx.tar.xz
      #     UPX_BIN=$(find "$RUNNER_TEMP/upx" -type f -name upx | head -1)
      #     if [ -z "$UPX_BIN" ]; then
      #       echo "UPX executable not found"
      #       exit 1
      #     fi
      #     chmod +x "$UPX_BIN"
      #     echo "UPX_BIN_PATH=$UPX_BIN" >> "$GITHUB_ENV"
      #     "$UPX_BIN" --version

      # - name: 压缩可压缩 Release 文件
      #   shell: bash
      #   run: |
      #     find . -type f -name "SiYuan-Kernel*.exe" -print0 | while IFS= read -r -d '' file; do
      #       "$UPX_BIN_PATH" --best "$file" || echo "UPX skipped: $file"
      #     done
      #     find . -type f -name "elevator.exe" -print0 | while IFS= read -r -d '' file; do
      #       "$UPX_BIN_PATH" --best "$file" || echo "UPX skipped: $file"
      #     done
      #     find . -type f -name "*.AppImage" -print0 | while IFS= read -r -d '' file; do
      #       "$UPX_BIN_PATH" --best "$file" || echo "UPX skipped: $file"
      #     done

      - name: 生成 SHA256SUMS
        run: |
          find . -type f \
            ! -name SHA256SUMS.txt \
            ! -path "*/_temp/*" \
            -print0 | sort -z | xargs -0 sha256sum | sed 's#  \./.*/#  #' > SHA256SUMS.txt

      - name: 校验 Release 文件
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          expected=(
            "siyuan-linux.AppImage/siyuan-${VERSION}-linux.AppImage"
            "siyuan-linux.tar.gz/siyuan-${VERSION}-linux.tar.gz"
            "siyuan-linux.deb/siyuan-${VERSION}-linux.deb"
            "siyuan-linux.rpm/siyuan-${VERSION}-linux.rpm"
            "siyuan-linux-arm64.AppImage/siyuan-${VERSION}-linux-arm64.AppImage"
            "siyuan-linux-arm64.tar.gz/siyuan-${VERSION}-linux-arm64.tar.gz"
            "siyuan-linux-arm64.deb/siyuan-${VERSION}-linux-arm64.deb"
            "siyuan-linux-arm64.rpm/siyuan-${VERSION}-linux-arm64.rpm"
            "siyuan-mac.dmg/siyuan-${VERSION}-mac.dmg"
            "siyuan-mac-arm64.dmg/siyuan-${VERSION}-mac-arm64.dmg"
            "siyuan-win.exe/siyuan-${VERSION}-win.exe"
            "siyuan-win.exe/siyuan-${VERSION}-win-portable.exe"
            "siyuan-win-arm64.exe/siyuan-${VERSION}-win-arm64.exe"
            "siyuan-win-arm64.exe/siyuan-${VERSION}-win-arm64-portable.exe"
            "siyuan-android/siyuan-${VERSION}-android-universal.apk"
            "siyuan-android/siyuan-${VERSION}-android-armeabi-v7a.apk"
            "siyuan-android/siyuan-${VERSION}-android-arm64-v8a.apk"
            "siyuan-android/siyuan-${VERSION}-android-x86.apk"
            "siyuan-android/siyuan-${VERSION}-android-x86_64.apk"
            "SHA256SUMS.txt"
          )
          missing=0
          for file in "${expected[@]}"; do
            if [ ! -s "$file" ]; then
              echo "Missing release asset: $file"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: 创建 Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: ${{ needs.prepare.outputs.release_title }}
          tag: ${{ github.ref_name }}
          body: ${{ needs.prepare.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          makeLatest: ${{ needs.prepare.outputs.make_latest }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 Release 文件
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          gh release upload ${{ github.ref_name }} --clobber \
            "SHA256SUMS.txt#SHA256SUMS.txt" \
            "siyuan-linux.AppImage/siyuan-${VERSION}-linux.AppImage#siyuan-${VERSION}-linux.AppImage" \
            "siyuan-linux.tar.gz/siyuan-${VERSION}-linux.tar.gz#siyuan-${VERSION}-linux.tar.gz" \
            "siyuan-linux.deb/siyuan-${VERSION}-linux.deb#siyuan-${VERSION}-linux.deb" \
            "siyuan-linux.rpm/siyuan-${VERSION}-linux.rpm#siyuan-${VERSION}-linux.rpm" \
            "siyuan-linux-arm64.AppImage/siyuan-${VERSION}-linux-arm64.AppImage#siyuan-${VERSION}-linux-arm64.AppImage" \
            "siyuan-linux-arm64.tar.gz/siyuan-${VERSION}-linux-arm64.tar.gz#siyuan-${VERSION}-linux-arm64.tar.gz" \
            "siyuan-linux-arm64.deb/siyuan-${VERSION}-linux-arm64.deb#siyuan-${VERSION}-linux-arm64.deb" \
            "siyuan-linux-arm64.rpm/siyuan-${VERSION}-linux-arm64.rpm#siyuan-${VERSION}-linux-arm64.rpm" \
            "siyuan-mac.dmg/siyuan-${VERSION}-mac.dmg#siyuan-${VERSION}-mac.dmg" \
            "siyuan-mac-arm64.dmg/siyuan-${VERSION}-mac-arm64.dmg#siyuan-${VERSION}-mac-arm64.dmg" \
            "siyuan-win.exe/siyuan-${VERSION}-win.exe#siyuan-${VERSION}-win.exe" \
            "siyuan-win.exe/siyuan-${VERSION}-win-portable.exe#siyuan-${VERSION}-win-portable.exe" \
            "siyuan-win-arm64.exe/siyuan-${VERSION}-win-arm64.exe#siyuan-${VERSION}-win-arm64.exe" \
            "siyuan-win-arm64.exe/siyuan-${VERSION}-win-arm64-portable.exe#siyuan-${VERSION}-win-arm64-portable.exe" \
            "siyuan-android/siyuan-${VERSION}-android-universal.apk#siyuan-${VERSION}-android-universal.apk" \
            "siyuan-android/siyuan-${VERSION}-android-armeabi-v7a.apk#siyuan-${VERSION}-android-armeabi-v7a.apk" \
            "siyuan-android/siyuan-${VERSION}-android-arm64-v8a.apk#siyuan-${VERSION}-android-arm64-v8a.apk" \
            "siyuan-android/siyuan-${VERSION}-android-x86.apk#siyuan-${VERSION}-android-x86.apk" \
            "siyuan-android/siyuan-${VERSION}-android-x86_64.apk#siyuan-${VERSION}-android-x86_64.apk"
